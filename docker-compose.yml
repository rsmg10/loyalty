services:
  backend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=loyalty;Username=loyalty;Password=loyalty
      Loyalty__VisitCooldownMinutes: 5
      MagicLinks__CustomerAppBaseUrl: http://localhost:5174
      MagicLinks__DefaultTtlDays: 180
      Reporting__AdminPhones: ""
      Reporting__SuspiciousWindowMinutes: 60
      Reporting__SuspiciousStaffStampThreshold: 40
      Reporting__SuspiciousCustomerRedemptionThreshold: 3
      Reporting__SuspiciousAdjustmentThreshold: 6
      ObjectStorage__Endpoint: minio:9000
      ObjectStorage__AccessKey: minioadmin
      ObjectStorage__SecretKey: minioadmin
      ObjectStorage__Bucket: loyalty-media
      ObjectStorage__PublicBaseUrl: http://localhost:9000
      ObjectStorage__UseSsl: false
    ports:
      - "5000:5000"
    depends_on:
      - minio
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/me >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "5173:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mobile:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: mobile/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "5174:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-dev:
    profiles: ["dev"]
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    command: dotnet watch --project /app/backend/Loyalty.Api/Loyalty.Api.csproj --urls http://0.0.0.0:5000 run
    environment:
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=loyalty;Username=loyalty;Password=loyalty
      Loyalty__VisitCooldownMinutes: 5
      MagicLinks__CustomerAppBaseUrl: http://localhost:5174
      MagicLinks__DefaultTtlDays: 180
      Reporting__AdminPhones: ""
      Reporting__SuspiciousWindowMinutes: 60
      Reporting__SuspiciousStaffStampThreshold: 40
      Reporting__SuspiciousCustomerRedemptionThreshold: 3
      Reporting__SuspiciousAdjustmentThreshold: 6
      ObjectStorage__Endpoint: minio:9000
      ObjectStorage__AccessKey: minioadmin
      ObjectStorage__SecretKey: minioadmin
      ObjectStorage__Bucket: loyalty-media
      ObjectStorage__PublicBaseUrl: http://localhost:9000
      ObjectStorage__UseSsl: false
      Seed__Enabled: true
    volumes:
      - ./:/app
    ports:
      - "5000:5000"
    depends_on:
      - minio
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/me >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-dev:
    profiles: ["dev"]
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mobile-dev:
    profiles: ["dev"]
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    volumes:
      - ./mobile:/app
      - mobile-node-modules:/app/node_modules
    ports:
      - "5174:5174"
    depends_on:
      - backend-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5174/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-13-22Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loyalty
      POSTGRES_USER: loyalty
      POSTGRES_PASSWORD: loyalty
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyalty -d loyalty"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    profiles: ["dev"]
    image: adminer:4
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  minio-data:
  postgres-data:
  web-node-modules:
  mobile-node-modules:
